<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    LTBox app icon — Material 3 baseline style.

    Background: filled circle in the M3 baseline `primary` (#6750A4),
    a recognisably "Material" purple. Radius 104 in a 256 canvas
    leaves ~24 px (≈9%) of transparent padding on each side — Windows
    Explorer + macOS Finder + Linux file managers all chrome a small
    cell around each icon, so the disc previously hugged the cell
    edges and read as oversized. The padding gives the mark room to
    breathe at any cell density.

    Foreground: Lucide `hammer` glyph (24x24 viewBox), horizontally
    flipped via `scale(-5.7, 5.7)` so the handle reads right-to-left,
    centered on the canvas, and stroked in M3 `on_primary` (white) so
    the icon stays legible at favicon scale.

    Sizing keeps the glyph's relationship to the disc constant: the
    disc shrank by ≈19% (128→104) so the hammer scales by the same
    factor (7→5.7), landing at ≈137 px (53% of canvas). Stroke
    inherits from the 2.5-unit Lucide weight and lands at an effective
    ≈14 px in the 256 frame — still close to Material Symbols
    weight-500 and chunky enough to survive favicon (16 px)
    downscaling.
  -->
  <circle cx="128" cy="128" r="104" fill="#6750A4"/>
  <g transform="translate(128 128) scale(-5.7 5.7) translate(-12 -12)"
     fill="none" stroke="#FFFFFF" stroke-width="2.5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="m15 12-9.373 9.373a1 1 0 0 1-3.001-3L12 9"/>
    <path d="m18 15 4-4"/>
    <path d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172v-.344a2 2 0 0 0-.586-1.414l-1.657-1.657A6 6 0 0 0 12.516 3H9l1.243 1.243A6 6 0 0 1 12 8.485V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5"/>
  </g>
</svg>
