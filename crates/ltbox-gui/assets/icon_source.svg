<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    LTBox app icon — Material 3 baseline style.

    Background: filled circle in the M3 baseline `primary` (#6750A4),
    a recognisably "Material" purple.

    Foreground: Lucide `hammer` glyph (24x24 viewBox), horizontally
    flipped via `scale(-7, 7)` so the handle reads right-to-left,
    centered on the canvas, and stroked in M3 `on_primary` (white) so
    the icon stays legible at favicon scale.

    Sizing follows the M3 product-icon keyline guidance: foreground
    occupies ~66% of the 256 canvas (24 × 7 = 168 px), so the glyph
    reads as the primary subject without crowding the disc edge.
    Stroke is bumped from the native Lucide 2-unit weight to 2.5 so
    it lands at an effective ~17.5 px in the 256 frame — close to a
    Material Symbols weight-500 stroke at the same render size and
    chunky enough to survive favicon (16 px) downscaling.
  -->
  <circle cx="128" cy="128" r="128" fill="#6750A4"/>
  <g transform="translate(128 128) scale(-7 7) translate(-12 -12)"
     fill="none" stroke="#FFFFFF" stroke-width="2.5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="m15 12-9.373 9.373a1 1 0 0 1-3.001-3L12 9"/>
    <path d="m18 15 4-4"/>
    <path d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172v-.344a2 2 0 0 0-.586-1.414l-1.657-1.657A6 6 0 0 0 12.516 3H9l1.243 1.243A6 6 0 0 1 12 8.485V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5"/>
  </g>
</svg>
