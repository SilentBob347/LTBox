<!DOCTYPE html>
<html><head><style>
body { background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding: 40px; }
.card { text-align: center; }
.card img { width: 200px; height: 200px; border-radius: 12px; }
.card p { margin-top: 12px; font-size: 18px; }
.sizes { display: flex; gap: 16px; align-items: end; margin-top: 12px; justify-content: center; }
.sizes img { border-radius: 6px; }
</style></head><body>
<div class="card">
  <img src="a_hexagon.svg">
  <p>A — Hexagon Tech</p>
  <div class="sizes">
    <img src="a_hexagon.svg" width="64" height="64">
    <img src="a_hexagon.svg" width="32" height="32">
    <img src="a_hexagon.svg" width="16" height="16">
  </div>
</div>
<div class="card">
  <img src="b_circle_ring.svg">
  <p>B — Circle Gradient Ring</p>
  <div class="sizes">
    <img src="b_circle_ring.svg" width="64" height="64">
    <img src="b_circle_ring.svg" width="32" height="32">
    <img src="b_circle_ring.svg" width="16" height="16">
  </div>
</div>
<div class="card">
  <img src="c_rounded_square.svg">
  <p>C — Rounded Square</p>
  <div class="sizes">
    <img src="c_rounded_square.svg" width="64" height="64">
    <img src="c_rounded_square.svg" width="32" height="32">
    <img src="c_rounded_square.svg" width="16" height="16">
  </div>
</div>
<div class="card">
  <img src="d_shield.svg">
  <p>D — Shield Badge</p>
  <div class="sizes">
    <img src="d_shield.svg" width="64" height="64">
    <img src="d_shield.svg" width="32" height="32">
    <img src="d_shield.svg" width="16" height="16">
  </div>
</div>
</body></html>
