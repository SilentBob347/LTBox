<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="10" fill="#237C4B"/>
  <!-- stacked slab suggests "full kernel image" — the whole boot
       partition is swapped rather than a single module -->
  <g transform="translate(10 8)" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="24" height="4" rx="1"/>
    <rect x="2" y="8" width="24" height="4" rx="1"/>
  </g>
  <text x="24" y="34" text-anchor="middle"
    font-family="Roboto, 'Segoe UI', system-ui, sans-serif" font-weight="700"
    font-size="12" fill="#ffffff" letter-spacing="0.8">GKI</text>
</svg>
