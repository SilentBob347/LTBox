<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="10" fill="#10B981"/>
  <!-- Magnifying glass ring: "auto-search for latest run" -->
  <circle cx="21" cy="21" r="9" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Center dot echoes the scanning concept -->
  <circle cx="21" cy="21" r="2.5" fill="white"/>
  <!-- Handle -->
  <line x1="27.5" y1="27.5" x2="36" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
