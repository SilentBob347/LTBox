name: Build qdl-rs

on:
  push:
    paths:
      - 'vendor/qdlrs/**'
      - '.github/workflows/build-qdlrs.yml'
  pull_request:
    paths:
      - 'vendor/qdlrs/**'
      - '.github/workflows/build-qdlrs.yml'
  workflow_call:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vendor/qdlrs
          cache-on-failure: true

      - name: Build qdl-rs
        working-directory: vendor/qdlrs
        run: cargo build --release --bin qdl-rs

      - name: Smoke test
        run: vendor/qdlrs/target/release/qdl-rs.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qdl-rs-windows
          path: vendor/qdlrs/target/release/qdl-rs.exe
          if-no-files-found: error
