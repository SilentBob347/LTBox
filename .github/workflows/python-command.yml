name: Reusable Python Command

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label
        required: false
        type: string
        default: ''
      python-version:
        description: Python version override (defaults to repository variable PYTHON_VERSION)
        required: false
        type: string
        default: ''
      task:
        description: Built-in command profile to execute (lint|unit|architecture|links)
        required: false
        type: string
        default: ''
      run-command:
        description: Optional custom shell command(s) to execute when task is not set
        required: false
        type: string
        default: ''
      extra-env:
        description: Multiline KEY=VALUE pairs appended to GITHUB_ENV
        required: false
        type: string
        default: ''
      default-pythonpath:
        description: Default PYTHONPATH written to GITHUB_ENV before running commands
        required: false
        type: string
        default: 'bin'
      default-pythonunbuffered:
        description: Default PYTHONUNBUFFERED written to GITHUB_ENV before running commands
        required: false
        type: string
        default: '1'

jobs:
  run:
    runs-on: ${{ inputs.runner != '' && inputs.runner || (inputs.task == 'unit' && 'windows-latest' || 'ubuntu-latest') }}
    env:
      PYTHON_VERSION: ${{ inputs.python-version != '' && inputs.python-version || vars.PYTHON_VERSION || '3.14' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Python tool caches
        uses: actions/cache@v5
        with:
          path: |
            .mypy_cache
            .ruff_cache
            .pytest_cache
          key: py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('bin/requirements.txt', 'bin/requirements-dev.txt', '.github/workflows/python-command.yml') }}
          restore-keys: |
            py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-py${{ env.PYTHON_VERSION }}-
            py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Python & Dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Apply standardized Python environment defaults
        shell: bash
        run: |
          {
            echo "PYTHONUNBUFFERED=${{ inputs.default-pythonunbuffered }}"
            echo "PYTHONPATH=${{ inputs.default-pythonpath }}"
          } >> "$GITHUB_ENV"

      - name: Apply extra environment variables
        if: ${{ inputs.extra-env != '' }}
        shell: bash
        run: |
          cat <<'EOF_ENV' >> "$GITHUB_ENV"
          ${{ inputs.extra-env }}
          EOF_ENV

      - name: Resolve command profile
        id: resolve-command
        shell: bash
        run: |
          case "${{ inputs.task }}" in
            lint)
              cat <<'EOF_COMMAND' >> "$GITHUB_OUTPUT"
              command<<'EOF'
              ruff check bin/ltbox tests
              ruff format --check bin/ltbox tests
              mypy bin/ltbox tests --ignore-missing-imports
              EOF
              EOF_COMMAND
              ;;
            unit)
              cat <<'EOF_COMMAND' >> "$GITHUB_OUTPUT"
              command<<'EOF'
              python -m compileall bin/ltbox
              pytest -s tests/ -m "not integration and not architecture" --cov=bin/ltbox --cov-report=term-missing
              EOF
              EOF_COMMAND
              ;;
            architecture)
              cat <<'EOF_COMMAND' >> "$GITHUB_OUTPUT"
              command<<'EOF'
              pytest -s tests/core/test_exports.py -m architecture
              EOF
              EOF_COMMAND
              ;;
            links)
              cat <<'EOF_COMMAND' >> "$GITHUB_OUTPUT"
              command<<'EOF'
              python tests/scripts/check_links.py
              EOF
              EOF_COMMAND
              ;;
            '')
              if [ -z "${{ inputs.run-command }}" ]; then
                echo "Either 'task' or 'run-command' must be provided." >&2
                exit 1
              fi
              cat <<'EOF_COMMAND' >> "$GITHUB_OUTPUT"
              command<<'EOF'
              ${{ inputs.run-command }}
              EOF
              EOF_COMMAND
              ;;
            *)
              echo "Unknown task '${{ inputs.task }}'. Use one of: lint, unit, architecture, links." >&2
              exit 1
              ;;
          esac

      - name: Run command
        run: |
          ${{ steps.resolve-command.outputs.command }}
