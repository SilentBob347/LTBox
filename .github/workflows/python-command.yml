name: Reusable Python Command

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
      python-version:
        description: Python version to install
        required: false
        type: string
        default: '3.14'
      run-command:
        description: Shell command(s) to execute
        required: true
        type: string
      extra-env:
        description: Multiline KEY=VALUE pairs appended to GITHUB_ENV
        required: false
        type: string
        default: ''
      default-pythonpath:
        description: Default PYTHONPATH written to GITHUB_ENV before running commands
        required: false
        type: string
        default: 'bin'
      default-pythonunbuffered:
        description: Default PYTHONUNBUFFERED written to GITHUB_ENV before running commands
        required: false
        type: string
        default: '1'

jobs:
  run:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Python tool caches
        uses: actions/cache@v5
        with:
          path: |
            .mypy_cache
            .ruff_cache
            .pytest_cache
          key: py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-py${{ inputs.python-version }}-${{ hashFiles('bin/requirements.txt', 'bin/requirements-dev.txt', '.github/workflows/python-command.yml') }}
          restore-keys: |
            py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-py${{ inputs.python-version }}-
            py-tool-cache-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Python & Dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: ${{ inputs.python-version }}

      - name: Apply standardized Python environment defaults
        shell: bash
        run: |
          {
            echo "PYTHONUNBUFFERED=${{ inputs.default-pythonunbuffered }}"
            echo "PYTHONPATH=${{ inputs.default-pythonpath }}"
          } >> "$GITHUB_ENV"

      - name: Apply extra environment variables
        if: ${{ inputs.extra-env != '' }}
        shell: bash
        run: |
          cat <<'EOF_ENV' >> "$GITHUB_ENV"
          ${{ inputs.extra-env }}
          EOF_ENV

      - name: Run command
        run: |
          ${{ inputs.run-command }}
