name: 'Release Tag Preflight'
description: 'Resolve a release tag and verify config version matches it.'
inputs:
  tag:
    description: 'Tag to resolve (for example, github.ref_name)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Resolve Tag Name
      shell: pwsh
      run: ./.github/scripts/release/resolve-tag.ps1 -Tag "${{ inputs.tag }}"

    - name: Verify Version Match
      shell: pwsh
      run: ./.github/scripts/release/verify-version-match.ps1 -TagName "$env:TAG_NAME"
